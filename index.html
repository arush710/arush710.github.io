<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A clean skeleton for a GitHub Pages hosted website.">
    <title>My GitHub Pages Site</title>
    
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Link to JavaScript (defer ensures it runs after HTML is parsed) -->
    <script src="js/script.js" defer></script>
</head>
<body>

    <header class="site-header">
        <div class="container">
            <h1 class="logo">Project Title</h1>
            <nav class="site-nav">
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main container">
        <section id="hero" class="hero-section">
            <h2>Welcome to Your New Site</h2>
            <p>This is a lightweight starter template optimized for fast loading and easy customization.</p>
            <button id="interactive-btn" class="btn">Click Me!</button>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Your Name. Powered by GitHub Pages.</p>
        </div>
    </footer>

</body>
</html>
